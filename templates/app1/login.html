<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#4f46e5,#06b6d4);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{
            width:420px;
            background:#fff;
            padding:40px;
            border-radius:18px;
            box-shadow:0 20px 40px rgba(0,0,0,.2);
        }

        .logo{
            text-align:center;
            margin-bottom:15px;
            font-size:55px;
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:8px;
        }

        .subtitle{
            text-align:center;
            color:#777;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:600;
            color:#444;
        }

        input,
        select{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            margin-bottom:18px;
            font-size:15px;
            transition:.3s;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#4f46e5;
            box-shadow:0 0 8px rgba(79,70,229,.25);
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#4f46e5;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#4338ca;
        }

        .error{
            background:#ffe5e5;
            color:#c62828;
            padding:10px;
            border-radius:8px;
            margin-bottom:20px;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#777;
            font-size:13px;
        }

        ul{
            list-style:none;
        }

        @media(max-width:500px){

            .login-container{
                width:90%;
                padding:25px;
            }

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="logo">
        🎓
    </div>

    <h2>Student Login</h2>

    <p class="subtitle">
        Online Examination Portal
    </p>

    {% if form.non_field_errors %}
        <div class="error">
            {% for error in form.non_field_errors %}
                {{ error }}
            {% endfor %}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        © 2026 Online Examination System
    </div>

</div>

</body>
</html>
